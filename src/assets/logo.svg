<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0e1e"/>
      <stop offset="100%" stop-color="#110d2b"/>
    </linearGradient>
    <linearGradient id="pulse" x1="5" y1="0" x2="43" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6d28d9" stop-opacity="0.35"/>
      <stop offset="38%"  stop-color="#a78bfa"/>
      <stop offset="60%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="11" fill="url(#bg)"/>

  <!-- Subtle horizontal grid rules -->
  <line x1="5" y1="33" x2="43" y2="33" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  <line x1="5" y1="23" x2="43" y2="23" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>

  <!-- Data-pulse path: flat → dip → sharp spike → return → flat -->
  <path d="M5,29 L12,29 L16,35 L22,8 L28,29 L43,29"
    fill="none"
    stroke="url(#pulse)"
    stroke-width="2.4"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Insight peak: outer glow + dot -->
  <circle cx="22" cy="8" r="6.5" fill="#f59e0b" opacity="0.12" filter="url(#glow)"/>
  <circle cx="22" cy="8" r="3.5" fill="#f59e0b" opacity="0.22"/>
  <circle cx="22" cy="8" r="2.5" fill="#f59e0b"/>
  <circle cx="22" cy="8" r="1.1" fill="#fef3c7"/>
</svg>
