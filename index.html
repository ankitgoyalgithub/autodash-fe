<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/app-icon.png" />
    <link rel="apple-touch-icon" href="/app-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>LucentReport — AI Dashboard Builder | Natural Language Analytics for Any Data Source</title>
    <meta name="description" content="Connect any database or cloud source, ask in plain English, and LucentReport's AI generates complete dashboards with charts, forecasts, and analytics in seconds. Finance AI Agents, PDF/PPTX export, 15+ chart types. Free to explore." />
    <meta name="keywords" content="AI dashboard builder, multi-database analytics, natural language SQL, text to SQL, automated dashboard generation, AI business intelligence, no-code analytics, data visualization tool, finance AI agents, month-end close automation, reconciliation dashboard, variance analysis, LucentReport, Snowflake analytics, BigQuery dashboard, MySQL analytics" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0c1445" />
    <link rel="canonical" href="https://lucentreport.app/" />

    <!-- Open Graph / LinkedIn / Slack previews -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lucentreport.app/" />
    <meta property="og:title" content="LucentReport — AI Dashboard Builder for Any Data Source" />
    <meta property="og:description" content="Connect any database or cloud source, ask in plain English, and LucentReport's AI builds complete dashboards with charts, forecasts, and analytics in seconds. Finance AI Agents, PDF/PPTX export. No SQL needed." />
    <meta property="og:image" content="https://lucentreport.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="LucentReport AI dashboard showing revenue charts and KPI cards" />
    <meta property="og:site_name" content="LucentReport" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LucentReport — AI Dashboard Builder for Any Data Source" />
    <meta name="twitter:description" content="Turn data from any source into beautiful AI-powered dashboards in seconds. Finance AI Agents, 15+ chart types, PDF/PPTX export. Plain English queries. No SQL needed." />
    <meta name="twitter:image" content="https://lucentreport.app/og-image.png" />
    <meta name="twitter:image:alt" content="LucentReport AI dashboard" />

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "LucentReport",
      "alternateName": "LucentReport AI Dashboard Builder",
      "applicationCategory": "BusinessApplication",
      "applicationSubCategory": "Data Visualization",
      "operatingSystem": "Web",
      "url": "https://lucentreport.app",
      "description": "AI-powered multi-database dashboard builder that converts plain English questions into charts, forecasts, and executive reports from any data source — using a multi-agent AI pipeline with Finance AI Agents and PDF/PPTX export.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free to explore"
      },
      "featureList": [
        "Natural language to SQL conversion",
        "Multi-agent AI pipeline (Planner, SQL Expert, Validator, Enricher)",
        "Automatic chart type selection",
        "15+ chart types: bar, line, area, pie, combo, scatter, table, treemap, sunburst, Sankey, bump chart, force graph",
        "Advanced analytics: forecasting, anomaly detection, Pareto analysis, trend decomposition, correlation heatmap, priority matrix",
        "7 Finance AI Agents: Reconciliation, Month-End Close, Variance Analysis, Financial Statement Close, Actuals Reporting, Exception Identification, Close Process Monitoring",
        "PDF, PPTX, and PNG export pipeline via headless browser rendering",
        "PostgreSQL, MySQL, Snowflake, BigQuery, Redshift, Salesforce, S3, Google Drive support",
        "Public dashboard deployment via shareable URL",
        "Role-based access control (Admin, Editor, Viewer)",
        "Multiple themes, color palettes, and brand kit",
        "Drill-down and global filter support",
        "Read-only SQL execution for data security",
        "httpOnly cookie authentication to prevent XSS token theft"
      ],
      "screenshot": "https://lucentreport.app/og-image.png"
    }
    </script>

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "LucentReport",
      "url": "https://lucentreport.app",
      "description": "AI-powered multi-database dashboard builder with Finance AI Agents and PDF/PPTX export",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://lucentreport.app/login",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What data sources does LucentReport support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "LucentReport connects to PostgreSQL, MySQL, Snowflake, Google BigQuery, Amazon S3 (via Athena), Salesforce, Google Drive (Sheets and CSV), Redshift, Supabase, Amazon RDS, and more."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to write SQL to use LucentReport?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. LucentReport's multi-agent AI automatically converts plain English questions into optimized SQL queries. Just describe what you want to see — LucentReport handles the SQL, chart selection, and insight generation."
          }
        },
        {
          "@type": "Question",
          "name": "How does LucentReport protect my database credentials and data?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Your database credentials stay on your own server. All SQL queries run in strict read-only mode against your database, and no data is stored externally by LucentReport. Auth tokens use httpOnly cookies to prevent XSS-based theft."
          }
        },
        {
          "@type": "Question",
          "name": "What chart types does LucentReport generate automatically?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "LucentReport supports 15+ chart types: bar, line, area, pie/donut, stacked bar, combo, horizontal bar, scatter, data table (via Recharts), plus advanced D3 visualizations including treemap, sunburst, Sankey diagram, bump chart, and force graph."
          }
        },
        {
          "@type": "Question",
          "name": "Can I export LucentReport dashboards to PowerPoint or PDF?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The built-in export pipeline uses a headless browser to render pixel-perfect screenshots of your dashboard and package them as a PPTX PowerPoint deck, PDF report, or high-resolution PNG poster."
          }
        },
        {
          "@type": "Question",
          "name": "Does LucentReport support finance and accounting workflows?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. LucentReport includes 7 Finance Specialist AI Agents: Reconciliation, Month-End Close, Variance Analysis, Financial Statement Close, Actuals Reporting, Exception Identification, and Close Process Monitoring. Each agent has pre-built domain expertise, required output cards, and SQL patterns."
          }
        },
        {
          "@type": "Question",
          "name": "Can I share LucentReport dashboards publicly?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Any dashboard can be deployed as a live public URL with one click — no LucentReport account required to view. Perfect for sharing with stakeholders, investors, or clients."
          }
        },
        {
          "@type": "Question",
          "name": "How is LucentReport different from Power BI or Tableau?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "LucentReport uses multi-agent AI to generate a complete, styled dashboard from a single plain English sentence in under 10 seconds. Unlike Power BI or Tableau, there is no drag-and-drop configuration, no data modeling, no DAX formulas, and no manual chart building required."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
