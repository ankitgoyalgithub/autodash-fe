<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b0764"/>
      <stop offset="50%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="bars" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ddd6fe" stop-opacity="0.75"/>
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="27%" r="40%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="13" fill="url(#bg)"/>
  <!-- Inner glow -->
  <rect width="48" height="48" rx="13" fill="url(#glow)"/>

  <!-- Ascending bars -->
  <rect x="7.5"  y="30" width="7.5" height="11" rx="2.5" fill="url(#bars)" opacity="0.55"/>
  <rect x="19.5" y="21" width="7.5" height="20" rx="2.5" fill="url(#bars)" opacity="0.78"/>
  <rect x="31.5" y="11" width="7.5" height="30" rx="2.5" fill="url(#bars)"/>

  <!-- Trend sparkline -->
  <polyline
    points="11.25,30 23.25,21 35.25,11"
    stroke="white" stroke-width="1.75"
    stroke-linecap="round" stroke-linejoin="round"
    stroke-opacity="0.35" fill="none"/>

  <!-- Peak dot with halo -->
  <circle cx="35.25" cy="11" r="5"   fill="white" fill-opacity="0.18"/>
  <circle cx="35.25" cy="11" r="3"   fill="white" fill-opacity="0.95"/>
</svg>
